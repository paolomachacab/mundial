name: Actualizar datos del Mundial

on:
  schedule:
    # Corre cada 3 horas (UTC). Ajustable segun horarios de partidos.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar script de actualizacion
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 scripts/fetch_matches.py

      - name: Guardar cambios si hay datos nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/partidos.json
          git diff --staged --quiet || git commit -m "Actualizar datos del Mundial [auto]"
          git push
